<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGA RP - 100 Missions</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --primary: #ff6b6b;
            --primary-dark: #ee5a6f;
            --secondary: #6c5cff;
            --accent: #00d4ff;
            --success: #10b981;
            --dark-bg: #0a0e27;
            --dark-bg-secondary: #1a1f3a;
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0b0;
            --rank-f: #6ee7b7;
            --rank-e: #60a5fa;
            --rank-d: #a78bfa;
            --rank-c: #fbbf24;
            --rank-b: #f472b6;
            --rank-a: #ef4444;
            --rank-s: #e9d5ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Sora', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1428 100%);
            min-height: 100vh;
            color: var(--text-primary);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 107, 107, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(108, 92, 231, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .header {
            background: rgba(26, 31, 58, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 107, 107, 0.1);
            padding: 32px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .header h1 {
            font-size: 2.8em;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b 0%, #6c5cff 50%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-subtitle {
            font-size: 0.85em;
            color: var(--text-secondary);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .rank-nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .rank-btn {
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 107, 107, 0.2);
            color: var(--text-secondary);
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75em;
            text-transform: uppercase;
            transition: all 0.3s;
            font-family: 'Sora', sans-serif;
        }

        .rank-btn:hover, .rank-btn.active {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.2) 0%, rgba(108, 92, 231, 0.2) 100%);
            border-color: var(--primary);
            color: white;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 40px;
        }

        .filters-section {
            margin-bottom: 40px;
            padding: 24px;
            background: linear-gradient(135deg, rgba(30, 35, 60, 0.4) 0%, rgba(42, 47, 72, 0.3) 100%);
            border: 1px solid rgba(255, 107, 107, 0.1);
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }

        .filter-label {
            font-size: 0.85em;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: block;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 107, 107, 0.2);
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75em;
            text-transform: uppercase;
            transition: all 0.3s;
            font-family: 'Sora', sans-serif;
        }

        .filter-btn:hover, .filter-btn.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-color: var(--primary);
            color: white;
        }

        .search-box {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 107, 107, 0.2);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'Sora', sans-serif;
            margin-bottom: 16px;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 107, 107, 0.08);
        }

        .missions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        .mission-card {
            background: linear-gradient(135deg, rgba(30, 35, 60, 0.6) 0%, rgba(42, 47, 72, 0.4) 100%);
            backdrop-filter: blur(15px);
            border: 1.5px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .mission-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, currentColor, transparent);
            opacity: 0.6;
        }

        .mission-card:hover {
            transform: translateY(-10px);
            border-color: currentColor;
            box-shadow: 0 30px 60px rgba(255, 107, 107, 0.15);
        }

        .mission-rank {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.75em;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid currentColor;
            margin-bottom: 12px;
        }

        .mission-enemies {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .enemy-tag {
            padding: 4px 8px;
            background: rgba(108, 92, 231, 0.2);
            border-radius: 6px;
            font-size: 0.7em;
            color: #c7d2fe;
            font-weight: 600;
        }

        .mission-title {
            font-size: 1.2em;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .mission-description {
            color: var(--text-secondary);
            font-size: 0.85em;
            line-height: 1.5;
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .reward-badge {
            background: linear-gradient(135deg, rgba(251, 191, 36, 0.15) 0%, rgba(251, 191, 36, 0.05) 100%);
            border: 1px solid rgba(251, 191, 36, 0.2);
            padding: 12px;
            border-radius: 8px;
            font-weight: 700;
            color: #fcd34d;
            text-align: center;
            margin-bottom: 12px;
            font-size: 1em;
        }

        .btn-view {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, currentColor 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.8em;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .btn-view:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.2);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(30, 35, 60, 0.95) 0%, rgba(42, 47, 72, 0.90) 100%);
            border: 1px solid rgba(255, 107, 107, 0.2);
            border-radius: 16px;
            padding: 40px;
            max-width: 750px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 24px;
            right: 24px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--text-secondary);
            font-size: 2em;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }

        .modal-close:hover {
            background: rgba(255, 107, 107, 0.2);
            color: var(--primary);
        }

        .modal-title {
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .modal-section {
            margin-bottom: 20px;
        }

        .modal-section-title {
            font-size: 0.9em;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .modal-content-text {
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: 0.95em;
        }

        .modal-list li {
            padding: 8px 0;
            padding-left: 20px;
            position: relative;
            color: var(--text-secondary);
        }

        .modal-list li::before {
            content: "▸";
            position: absolute;
            left: 0;
            color: var(--primary);
            font-weight: 700;
        }

        .reward-display {
            font-size: 1.8em;
            color: #fcd34d;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .btn-accept {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95em;
            text-transform: uppercase;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .btn-accept:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }

        .mission-count {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
            font-size: 0.9em;
        }

        @media (max-width: 640px) {
            .header h1 { font-size: 1.8em; }
            .container { padding: 20px; }
            .missions-grid { grid-template-columns: 1fr; gap: 20px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div>
                <h1>⚔️ EGA RP - 100 MISSIONS</h1>
                <p class="header-subtitle">Ennemis variés • Rangs F à S</p>
            </div>
            <div class="rank-nav">
                <button class="rank-btn active" onclick="filterByRank('all')">TOUS</button>
                <button class="rank-btn" onclick="filterByRank('F')">F</button>
                <button class="rank-btn" onclick="filterByRank('E')">E</button>
                <button class="rank-btn" onclick="filterByRank('D')">D</button>
                <button class="rank-btn" onclick="filterByRank('C')">C</button>
                <button class="rank-btn" onclick="filterByRank('B')">B</button>
                <button class="rank-btn" onclick="filterByRank('A')">A</button>
                <button class="rank-btn" onclick="filterByRank('S')">S</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="filters-section">
            <label class="filter-label">🔍 Rechercher une mission</label>
            <input type="text" class="search-box" id="searchInput" placeholder="Nom de la mission, ennemi..." onkeyup="applyFilters()">
            
            <label class="filter-label">🗡️ Filtrer par Ennemi</label>
            <div class="filter-group">
                <button class="filter-btn active" onclick="filterByEnemy('all')">Tous</button>
                <button class="filter-btn" onclick="filterByEnemy('Lézards')">👽 Lézards</button>
                <button class="filter-btn" onclick="filterByEnemy('Démons')">👿 Démons</button>
                <button class="filter-btn" onclick="filterByEnemy('Chevaliers')">⚔️ Chevaliers</button>
                <button class="filter-btn" onclick="filterByEnemy('Bandits')">🏴 Bandits</button>
                <button class="filter-btn" onclick="filterByEnemy('Dragons')">🐉 Dragons</button>
                <button class="filter-btn" onclick="filterByEnemy('Cultistes')">👻 Cultistes</button>
                <button class="filter-btn" onclick="filterByEnemy('Créatures')">👹 Créatures</button>
            </div>
        </div>

        <div class="missions-grid" id="missionsContainer"></div>
        <div class="mission-count" id="missionCount"></div>
    </div>

    <div class="modal" id="missionModal" onclick="closeMissionModal(event)">
        <button class="modal-close" onclick="closeMissionModal()">✕</button>
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-title" id="modalTitle"></div>
            
            <div class="modal-section">
                <div class="modal-section-title">👾 Ennemis</div>
                <div class="modal-content-text" id="modalEnemies"></div>
            </div>

            <div class="modal-section">
                <div class="modal-section-title">📝 Description</div>
                <div class="modal-content-text" id="modalDescription"></div>
            </div>

            <div class="modal-section">
                <div class="modal-section-title">🎯 Objectif</div>
                <div class="modal-content-text" id="modalObjective"></div>
            </div>

            <div class="modal-section">
                <div class="modal-section-title">⚠️ Défis</div>
                <ul class="modal-list" id="modalChallenges"></ul>
            </div>

            <div class="modal-section">
                <div class="modal-section-title">💎 Récompenses</div>
                <div class="reward-display" id="modalReward"></div>
                <ul class="modal-list" id="modalBonuses"></ul>
            </div>

            <button class="btn-accept" onclick="acceptMission()">✓ ACCEPTER</button>
        </div>
    </div>

    <script>
        const missions = {
            F: [
                { title: 'Chasse aux Lézards Mineurs', enemies: ['Lézards Blancs'], description: 'Éliminer des petits lézards blancs qui ravagent les cultures.', objective: 'Vaincre 10 lézards mineurs', challenges: ['Agilité rapide', 'Attaques combinées'], reward: 2200, bonuses: ['Sans blessure: +400'] },
                { title: 'Patrouille Contre les Bandits', enemies: ['Bandits'], description: 'Patrouiller et arrêter les bandits locaux.', objective: 'Capturer 3 bandits', challenges: ['Rapides', 'Embuscades'], reward: 2500, bonuses: ['Tous vivants: +500'] },
                { title: 'Escorte Civile Périlleuse', enemies: ['Lézards Blancs', 'Créatures'], description: 'Escorter des civils à travers zone dangereuse.', objective: 'Protéger 5 civils', challenges: ['Attaques inattendues'], reward: 2300, bonuses: ['Tous sauvés: +600'] },
                { title: 'Collecte de Ressources', enemies: ['Créatures Mineures'], description: 'Collecter minerais tout en combattant des créatures.', objective: 'Collecter 20 minerais', challenges: ['Zone dangereuse'], reward: 2100, bonuses: ['Complet: +400'] },
                { title: 'Défense du Village', enemies: ['Bandits', 'Lézards'], description: 'Défendre le village contre des attaquants.', objective: 'Résister 30 minutes', challenges: ['Vagues continues'], reward: 2700, bonuses: ['Sans dégâts: +700'] },
                { title: 'Recherche de Disparu', enemies: ['Créatures Blanches'], description: 'Retrouver un disparu dans la forêt.', objective: 'Retrouver et ramener sain', challenges: ['Créatures hostiles'], reward: 2400, bonuses: ['Rapide: +500'] },
                { title: 'Chasse aux Démons Mineurs', enemies: ['Démons Faibles'], description: 'Éliminer de jeunes démons.', objective: 'Vaincre 5 démons', challenges: ['Magie noire faible'], reward: 2600, bonuses: ['Sans magie: +600'] },
                { title: 'Raid Bandit Mineur', enemies: ['Bandits'], description: 'Attaquer un petit repaire bandit.', objective: 'Libérer les otages', challenges: ['10 bandits'], reward: 2800, bonuses: ['Tous sauvés: +800'] },
                { title: 'Nettoyage de Grotte', enemies: ['Créatures', 'Lézards'], description: 'Nettoyer une grotte infestée.', objective: 'Éliminer tous les habitants', challenges: ['Environnement hostile'], reward: 2350, bonuses: ['Complet: +450'] },
                { title: 'Escorte Marchand', enemies: ['Bandits'], description: 'Protéger un marchand en route.', objective: 'Destination atteinte', challenges: ['Attaques de bandits'], reward: 2900, bonuses: ['Marchandise intacte: +700'] },
                { title: 'Piégeur de Créatures', enemies: ['Créatures Mineures'], description: 'Capturer des créatures vivantes.', objective: 'Capturer 5 créatures', challenges: ['Doivent être vivantes'], reward: 2200, bonuses: ['Tous vivants: +600'] },
                { title: 'Extermination Lézards', enemies: ['Lézards Blancs'], description: 'Éliminer les lézards d\'une région.', objective: 'Tuer 15 lézards', challenges: ['En groupe'], reward: 2650, bonuses: ['Rapide: +500'] },
                { title: 'Sauvage du Mal', enemies: ['Petits Démons'], description: 'Sauver quelqu\'un sous contrôle démoniaque.', objective: 'Briser le contrôle', challenges: ['Magie sombre'], reward: 2550, bonuses: ['Sans violence: +700'] },
                { title: 'Contrôle des Récoltes', enemies: ['Lézards', 'Créatures'], description: 'Protéger les récoltes des ravageurs.', objective: 'Sécuriser les champs', challenges: ['Nombreuses créatures'], reward: 2400, bonuses: ['100% protégé: +600'] },
                { title: 'Traceur de Criminel', enemies: ['Bandits'], description: 'Tracer et capturer un criminel.', objective: 'Capturer vivant', challenges: ['Fugitif rapide'], reward: 2700, bonuses: ['Vivant: +800'] }
            ],
            E: [
                { title: 'Invasion Lézards de Montagne', enemies: ['Lézards Majeurs'], description: 'Repousser une invasion de lézards.', objective: 'Vaincre 20 lézards majeurs', challenges: ['Coordonnés', 'Défenses'], reward: 3200, bonuses: ['Sans pertes: +900'] },
                { title: 'Culte Démoniaque Mineure', enemies: ['Démons Faibles', 'Cultistes'], description: 'Arrêter un petit culte démoniaque.', objective: 'Capturer les cultistes', challenges: ['Rituels', 'Magie'], reward: 3400, bonuses: ['Tous capturés: +1000'] },
                { title: 'Chevaliers Corrompus', enemies: ['Chevaliers Noirs'], description: 'Affronter des chevaliers corrompus.', objective: 'Vaincre 5 chevaliers', challenges: ['Armure lourde', 'Techniques'], reward: 3600, bonuses: ['Sans aide: +1100'] },
                { title: 'Repaire Bandit Majeur', enemies: ['Bandits', 'Chef Bandit'], description: 'Détruire un repaire bandit établi.', objective: 'Capturer le chef', challenges: ['20+ bandits'], reward: 3800, bonuses: ['Chef capturé: +1200'] },
                { title: 'Créature Mutante', enemies: ['Créature Mutante'], description: 'Tracer et éliminer une créature mutante.', objective: 'Éliminer la menace', challenges: ['Imprévisible', 'Forte'], reward: 3500, bonuses: ['Rapide: +1000'] },
                { title: 'Démons Multiples', enemies: ['Démons Normaux'], description: 'Combattre plusieurs démons simultanément.', objective: 'Vaincre 8 démons', challenges: ['Magie coordonnée'], reward: 3300, bonuses: ['Sans dégâts: +1000'] },
                { title: 'Cavalerie Chevalier', enemies: ['Chevaliers'], description: 'Affronter une escouade de chevaliers.', objective: 'Vaincre 7 chevaliers', challenges: ['Formation tactique'], reward: 3700, bonuses: ['Formation brisée: +1100'] },
                { title: 'Marché Noir Bandit', enemies: ['Bandits Organisés'], description: 'Infiltrer et détruire un marché noir.', objective: 'Arrêter les trafiquants', challenges: ['Infiltration', 'Nombre'], reward: 3650, bonuses: ['Butin saisi: +1300'] },
                { title: 'Tempête de Lézards', enemies: ['Lézards en Essaim'], description: 'Survivre à une tempête de lézards.', objective: 'Tenir 1 heure', challenges: ['Centaines de créatures'], reward: 3900, bonuses: ['Sans blessure majeure: +1200'] },
                { title: 'Chasse Dragon Juvénile', enemies: ['Dragon Juvénile'], description: 'Chasser un jeune dragon.', objective: 'Vaincre le dragon', challenges: ['Puissant', 'Aérien'], reward: 4200, bonuses: ['Rapide: +1500'] },
                { title: 'Siège Forteresse Bandits', enemies: ['Bandits Fortifiés'], description: 'Assiéger une forteresse bandit.', objective: 'Prendre la forteresse', challenges: ['Défenses', '30+ bandits'], reward: 4100, bonuses: ['Rapide: +1400'] },
                { title: 'Rituel Sombre Cultistes', enemies: ['Cultistes', 'Démons'], description: 'Interrompre un rituel sombre.', objective: 'Stopper avant la fin', challenges: ['Temps limité', 'Magie'], reward: 3950, bonuses: ['Avant invocation: +1600'] },
                { title: 'Arena Chevaliers', enemies: ['Chevaliers d\'Élite'], description: 'Combattre des chevaliers d\'élite à l\'arène.', objective: 'Remporter 5 duels', challenges: ['Puissants', 'Expérimentés'], reward: 4300, bonuses: ['Sans blessure: +1500'] },
                { title: 'Guérilla Bandit', enemies: ['Bandits Mobiles'], description: 'Combattre une guérilla bandit.', objective: 'Éliminer 15 bandits', challenges: ['Tactiques', 'Mobilité'], reward: 3850, bonuses: ['Rapide: +1100'] },
                { title: 'Mutants Lézards', enemies: ['Lézards Mutants'], description: 'Combattre des lézards mutants.', objective: 'Vaincre 10 mutants', challenges: ['Évolution', 'Force'], reward: 3750, bonuses: ['Tous étudiés: +950'] }
            ],
            D: [
                { title: 'Invasion Démoniaque Régionale', enemies: ['Démons Puissants', 'Cultistes'], description: 'Repousser une invasion démoniaque.', objective: 'Fermer les portails', challenges: ['50+ démons', 'Portails magiques'], reward: 4800, bonuses: ['Tous fermés: +1500'] },
                { title: 'Roi des Lézards', enemies: ['Lézards Alpha', 'Roi Lézard'], description: 'Affronter le roi lézard.', objective: 'Vaincre le roi', challenges: ['Ultra puissant', 'Essaim'], reward: 5200, bonuses: ['Sans aide: +1800'] },
                { title: 'Chevalier Légendaire', enemies: ['Chevalier Légendaire'], description: 'Affronter un chevalier légendaire.', objective: 'Vaincre le chevalier', challenges: ['Puissance extrême'], reward: 5500, bonuses: ['Rapide: +2000'] },
                { title: 'Seigneur Bandit', enemies: ['Bandits d\'Élite', 'Seigneur'], description: 'Renverser un seigneur bandit.', objective: 'Capturer le seigneur', challenges: ['100+ bandits', 'Stratégie'], reward: 5800, bonuses: ['Vif: +2200'] },
                { title: 'Dragon de Caverne', enemies: ['Dragon Adulte'], description: 'Affronter un dragon des cavernes.', objective: 'Vaincre le dragon', challenges: ['Cracheur de feu'], reward: 6200, bonuses: ['Écailles intactes: +2500'] },

        let currentRankFilter = 'all';
        let currentEnemyFilter = 'all';

        function renderMissions() {
            const container = document.getElementById('missionsContainer');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let toShow = [];

            Object.keys(missions).forEach(rank => {
                if (currentRankFilter === 'all' || currentRankFilter === rank) {
                    missions[rank].forEach(mission => {
                        const matchesSearch = mission.title.toLowerCase().includes(searchTerm) || 
                                            mission.enemies.some(e => e.toLowerCase().includes(searchTerm));
                        const matchesEnemy = currentEnemyFilter === 'all' || 
                                           mission.enemies.some(e => {
                                               if (currentEnemyFilter === 'Lézards') return e.includes('Lézard');
                                               if (currentEnemyFilter === 'Démons') return e.includes('Démon');
                                               if (currentEnemyFilter === 'Chevaliers') return e.includes('Chevalier');
                                               if (currentEnemyFilter === 'Bandits') return e.includes('Bandit');
                                               if (currentEnemyFilter === 'Dragons') return e.includes('Dragon');
                                               if (currentEnemyFilter === 'Cultistes') return e.includes('Culte');
                                               if (currentEnemyFilter === 'Créatures') return e.includes('Créature');
                                               return false;
                                           });

                        if (matchesSearch && matchesEnemy) {
                            toShow.push({ ...mission, rank });
                        }
                    });
                }
            });

            container.innerHTML = toShow.map(mission => {
                const rankColors = {F: 'var(--rank-f)', E: 'var(--rank-e)', D: 'var(--rank-d)', C: 'var(--rank-c)', B: 'var(--rank-b)', A: 'var(--rank-a)', S: 'var(--rank-s)'};
                return `
                    <div class="mission-card" style="color: ${rankColors[mission.rank]};">
                        <div class="mission-rank">Rang ${mission.rank}</div>
                        <div class="mission-enemies">${mission.enemies.map(e => `<span class="enemy-tag">${e}</span>`).join('')}</div>
                        <div class="mission-title">${mission.title}</div>
                        <div class="mission-description">${mission.description}</div>
                        <div class="reward-badge">💎 ${mission.reward.toLocaleString()} Jewels</div>
                        <button class="btn-view" onclick='openMissionModal(${JSON.stringify(mission).replace(/'/g, "&apos;")})'>Détails →</button>
                    </div>
                `;
            }).join('');

            document.getElementById('missionCount').innerHTML = `<strong>${toShow.length}</strong> mission${toShow.length > 1 ? 's' : ''} trouvée${toShow.length > 1 ? 's' : ''}`;
        }

        function filterByRank(rank) {
            currentRankFilter = rank;
            document.querySelectorAll('.rank-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderMissions();
        }

        function filterByEnemy(enemy) {
            currentEnemyFilter = enemy;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderMissions();
        }

        function applyFilters() {
            renderMissions();
        }

        function openMissionModal(mission) {
            document.getElementById('modalTitle').textContent = mission.title;
            document.getElementById('modalEnemies').textContent = mission.enemies.join(', ');
            document.getElementById('modalDescription').textContent = mission.description;
            document.getElementById('modalObjective').textContent = mission.objective;
            document.getElementById('modalReward').textContent = `💎 ${mission.reward.toLocaleString()} Jewels`;
            document.getElementById('modalChallenges').innerHTML = mission.challenges.map(c => `<li>${c}</li>`).join('');
            document.getElementById('modalBonuses').innerHTML = mission.bonuses.map(b => `<li>${b}</li>`).join('');
            document.getElementById('missionModal').classList.add('active');
        }

        function closeMissionModal(event) {
            if (event && event.target.id !== 'missionModal') return;
            document.getElementById('missionModal').classList.remove('active');
        }

        function acceptMission() {
            alert('✅ Mission acceptée! Bonne chance!');
            closeMissionModal();
        }

        renderMissions();
