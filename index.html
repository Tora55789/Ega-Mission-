<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGA RP - 100 Missions</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --primary: #ff6b6b;
            --primary-dark: #ee5a6f;
            --secondary: #6c5cff;
            --accent: #00d4ff;
            --success: #10b981;
            --dark-bg: #0a0e27;
            --dark-bg-secondary: #1a1f3a;
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0b0;
            --rank-f: #6ee7b7;
            --rank-e: #60a5fa;
            --rank-d: #a78bfa;
            --rank-c: #fbbf24;
            --rank-b: #f472b6;
            --rank-a: #ef4444;
            --rank-s: #e9d5ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Sora', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1428 100%);
            min-height: 100vh;
            color: var(--text-primary);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 107, 107, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(108, 92, 231, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .header {
            background: rgba(26, 31, 58, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 107, 107, 0.1);
            padding: 32px 40px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .header h1 {
            font-size: 2.8em;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b 0%, #6c5cff 50%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-subtitle {
            font-size: 0.85em;
            color: var(--text-secondary);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .rank-nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .rank-btn {
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 107, 107, 0.2);
            color: var(--text-secondary);
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75em;
            text-transform: uppercase;
            transition: all 0.3s;
            font-family: 'Sora', sans-serif;
        }

        .rank-btn:hover, .rank-btn.active {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.2) 0%, rgba(108, 92, 231, 0.2) 100%);
            border-color: var(--primary);
            color: white;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 40px;
        }

        .filters-section {
            margin-bottom: 40px;
            padding: 24px;
            background: linear-gradient(135deg, rgba(30, 35, 60, 0.4) 0%, rgba(42, 47, 72, 0.3) 100%);
            border: 1px solid rgba(255, 107, 107, 0.1);
            border-radius: 16px;
        }

        .filter-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-label {
            font-size: 0.85em;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-btn {
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(108, 92, 231, 0.3);
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75em;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .filter-btn:hover, .filter-btn.active {
            background: rgba(108, 92, 231, 0.3);
            border-color: var(--secondary);
            color: white;
        }

        .search-container {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        #searchInput {
            flex: 1;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 107, 107, 0.2);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.9em;
        }

        #searchInput::placeholder {
            color: var(--text-secondary);
        }

        #searchInput:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
        }

        .missions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .mission-card {
            background: linear-gradient(135deg, rgba(30, 35, 60, 0.5) 0%, rgba(42, 47, 72, 0.4) 100%);
            border: 1px solid rgba(255, 107, 107, 0.15);
            border-radius: 14px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }

        .mission-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.1) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .mission-card:hover {
            transform: translateY(-8px);
            border-color: currentColor;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .mission-card:hover::before {
            opacity: 1;
        }

        .mission-rank {
            display: inline-block;
            padding: 6px 12px;
            background: rgba(255, 107, 107, 0.15);
            border: 1px solid currentColor;
            border-radius: 6px;
            font-size: 0.75em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .mission-enemies {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 16px;
        }

        .enemy-tag {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(108, 92, 231, 0.2);
            border: 1px solid rgba(108, 92, 231, 0.4);
            border-radius: 4px;
            font-size: 0.7em;
            color: var(--text-secondary);
        }

        .mission-title {
            font-size: 1.3em;
            font-weight: 700;
            margin-bottom: 10px;
            color: currentColor;
        }

        .mission-description {
            font-size: 0.9em;
            color: var(--text-secondary);
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .reward-badge {
            display: inline-block;
            padding: 8px 14px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2) 0%, rgba(16, 185, 129, 0.1) 100%);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 8px;
            font-size: 0.85em;
            font-weight: 600;
            color: var(--success);
            margin-bottom: 16px;
        }

        .btn-view {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.2) 0%, rgba(108, 92, 231, 0.2) 100%);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: var(--text-primary);
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85em;
        }

        .btn-view:hover {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.4) 0%, rgba(108, 92, 231, 0.4) 100%);
            transform: translateY(-2px);
        }

        .mission-count {
            text-align: center;
            margin-bottom: 30px;
            color: var(--text-secondary);
            font-size: 0.9em;
        }

        .mission-count strong {
            color: var(--primary);
            font-size: 1.2em;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 14, 39, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1f3a 0%, #141829 100%);
            border: 1px solid rgba(255, 107, 107, 0.2);
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
        }

        .modal-header {
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 2em;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .modal-enemies {
            color: var(--text-secondary);
            font-size: 0.9em;
        }

        .modal-section {
            margin-bottom: 24px;
        }

        .modal-section-title {
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 700;
        }

        .modal-section-content {
            color: var(--text-primary);
            line-height: 1.6;
        }

        .modal-list {
            list-style: none;
        }

        .modal-list li {
            padding: 8px 0;
            color: var(--text-primary);
            border-bottom: 1px solid rgba(255, 107, 107, 0.1);
        }

        .modal-reward {
            display: inline-block;
            padding: 12px 18px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 10px;
            font-weight: 700;
            color: white;
            margin-bottom: 24px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        .btn-accept {
            flex: 1;
            padding: 14px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-accept:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }

        .btn-close {
            flex: 1;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 107, 107, 0.2);
            border-radius: 10px;
            color: var(--text-primary);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-close:hover {
            background: rgba(255, 107, 107, 0.1);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .header-content {
                flex-direction: column;
                gap: 16px;
            }

            .rank-nav {
                width: 100%;
                justify-content: center;
            }

            .missions-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 20px;
            }

            .modal-content {
                padding: 24px;
                max-height: 95vh;
            }

            .header {
                padding: 16px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div>
                <h1>EGA RP ◆ 100 MISSIONS</h1>
                <p class="header-subtitle">Système de missions premium</p>
            </div>
            <div class="rank-nav">
                <button class="rank-btn active" onclick="filterByRank('all')">ALL</button>
                <button class="rank-btn" onclick="filterByRank('F')">F</button>
                <button class="rank-btn" onclick="filterByRank('E')">E</button>
                <button class="rank-btn" onclick="filterByRank('D')">D</button>
                <button class="rank-btn" onclick="filterByRank('C')">C</button>
                <button class="rank-btn" onclick="filterByRank('B')">B</button>
                <button class="rank-btn" onclick="filterByRank('A')">A</button>
                <button class="rank-btn" onclick="filterByRank('S')">S</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="filters-section">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="🔍 Chercher une mission..." onkeyup="applyFilters()">
            </div>
            <div class="filter-group">
                <span class="filter-label">Filtrer par ennemis:</span>
                <button class="filter-btn active" onclick="filterByEnemy('all')">Tous</button>
                <button class="filter-btn" onclick="filterByEnemy('Bandits')">👿 Bandits</button>
                <button class="filter-btn" onclick="filterByEnemy('Dragons')">🐉 Dragons</button>
                <button class="filter-btn" onclick="filterByEnemy('Lézards')">🦎 Lézards</button>
                <button class="filter-btn" onclick="filterByEnemy('Démons')">👹 Démons</button>
                <button class="filter-btn" onclick="filterByEnemy('Chevaliers')">⚔️ Chevaliers</button>
                <button class="filter-btn" onclick="filterByEnemy('Cultistes')">🕯️ Cultistes</button>
                <button class="filter-btn" onclick="filterByEnemy('Créatures')">👾 Créatures</button>
            </div>
        </div>

        <div class="mission-count" id="missionCount"></div>
        <div class="missions-grid" id="missionsContainer"></div>
    </div>

    <div class="modal" id="missionModal" onclick="closeMissionModal(event)">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Mission</div>
                <div class="modal-enemies" id="modalEnemies">Ennemis</div>
            </div>

            <div class="modal-section">
                <div class="modal-section-title">Description</div>
                <div class="modal-section-content" id="modalDescription">Description</div>
            </div>

            <div class="modal-section">
                <div class="modal-section-title">Objectif</div>
                <div class="modal-section-content" id="modalObjective">Objectif</div>
            </div>

            <div class="modal-section">
                <div class="modal-section-title">Défis</div>
                <ul class="modal-list" id="modalChallenges"></ul>
            </div>

            <div class="modal-section">
                <div class="modal-section-title">Bonus</div>
                <ul class="modal-list" id="modalBonuses"></ul>
            </div>

            <div class="modal-reward" id="modalReward">💎 0 Jewels</div>

            <div class="modal-buttons">
                <button class="btn-accept" onclick="acceptMission()">Accepter la mission</button>
                <button class="btn-close" onclick="closeMissionModal()">Fermer</button>
            </div>
        </div>
    </div>

    <script>
        const missions = {
            F: [
                { title: 'Escorte de Caravane', enemies: ['Bandits Mineurs'], description: 'Escorter une caravane marchande à travers un territoire dangereux.', objective: 'Caravane en sécurité', challenges: ['Embuscades'], reward: 250, bonuses: ['Fluidité: +100'] },
                { title: 'Chasse au Lézard', enemies: ['Lézard Commun'], description: 'Chasser un lézard sauvage causant des dégâts.', objective: 'Lézard neutralisé', challenges: ['Rapide'], reward: 280, bonuses: ['Créature capturée: +120'] },
                { title: 'Bandits de Route', enemies: ['Bandit Routier'], description: 'Éliminer un groupe de bandits de route.', objective: 'Bandits éliminés', challenges: ['Coordonnés'], reward: 300, bonuses: ['Route sécurisée: +150'] },
                { title: 'Chasse au Dragon Mineur', enemies: ['Dragon Mineur'], description: 'Affronter un jeune dragon.', objective: 'Dragon défait', challenges: ['Aérien'], reward: 350, bonuses: ['Trésor dragon: +200'] },
                { title: 'Cultistes Mineurs', enemies: ['Culte Mineur'], description: 'Disperser un culte mineur.', objective: 'Culte dispersé', challenges: ['Fanatiques'], reward: 280, bonuses: ['Sanctuaire purifié: +120'] },
                { title: 'Créature Sauvage', enemies: ['Créature Sauvage'], description: 'Combattre une créature sauvage.', objective: 'Créature apprivoisée', challenges: ['Instinctive'], reward: 240, bonuses: ['Accordé: +100'] },
                { title: 'Protection Villageoise', enemies: ['Créatures Nocturnes'], description: 'Protéger un village des créatures nocturnes.', objective: 'Village sauvé', challenges: ['Vagues'], reward: 320, bonuses: ['Reconnaissance: +140'] },
                { title: 'Chasse au Trésor Mineur', enemies: ['Gardien Mineur'], description: 'Récupérer un trésor gardé par des créatures.', objective: 'Trésor obtenu', challenges: ['Énigme'], reward: 280, bonuses: ['Richesse: +120'] },
                { title: 'Espion Débutant', enemies: ['Éclaireur'], description: 'Éliminer un éclaireur ennemi.', objective: 'Information récupérée', challenges: ['Furtif'], reward: 260, bonuses: ['Discrétion: +110'] },
                { title: 'Quête de Remède', enemies: ['Créatures Toxiques'], description: 'Trouver un remède contre un poison.', objective: 'Remède obtenu', challenges: ['Toxicité'], reward: 290, bonuses: ['Guérison: +125'] }
            ],
            E: [
                { title: 'Bandits Organisés', enemies: ['Chef Bandit'], description: 'Éliminer le chef d\'un groupe de bandits.', objective: 'Chef abattu', challenges: ['Préparé'], reward: 600, bonuses: ['Trésor saisi: +300'] },
                { title: 'Lézard Géant', enemies: ['Lézard Géant'], description: 'Affronter un lézard de taille imposante.', objective: 'Bête maîtrisée', challenges: ['Massive'], reward: 650, bonuses: ['Carapace: +320'] },
                { title: 'Dragon de Caverne', enemies: ['Dragon de Caverne'], description: 'Affronter un dragon dans sa tanière.', objective: 'Caverne sécurisée', challenges: ['Lair', 'Venin'], reward: 750, bonuses: ['Trésor montagne: +400'] },
                { title: 'Démon Mineur', enemies: ['Démon Inférieur'], description: 'Affronter un démon de faible rang.', objective: 'Démon renvoyé', challenges: ['Magie'], reward: 700, bonuses: ['Sortilège: +350'] },
                { title: 'Chevalier Noir Solitaire', enemies: ['Chevalier Noir'], description: 'Affronter un chevalier noir isolé.', objective: 'Chevalier vaincu', challenges: ['Expert'], reward: 680, bonuses: ['Armure: +330'] },
                { title: 'Culte Organisé', enemies: ['Chef Cultiste'], description: 'Détruire un culte organisé.', objective: 'Culte éradiqué', challenges: ['Rituels'], reward: 620, bonuses: ['Sanctuaire purifié: +310'] },
                { title: 'Créature Évoluée', enemies: ['Créature Évoluée'], description: 'Combattre une créature devenue intelligente.', objective: 'Créature neutralisée', challenges: ['Intelligente'], reward: 640, bonuses: ['Evolution stoppée: +320'] },
                { title: 'Récupération Dangereuse', enemies: ['Gardiens de Trésor'], description: 'Récupérer un artefact ancien gardé.', objective: 'Artefact en sécurité', challenges: ['Pièges'], reward: 670, bonuses: ['Connaissance: +330'] },
                { title: 'Espionnage Avancé', enemies: ['Maître Espion'], description: 'Arrêter un réseau d\'espionnage.', objective: 'Réseau démoli', challenges: ['Coordonné'], reward: 630, bonuses: ['Secret récupéré: +310'] },
                { title: 'Quête d\'Antidote', enemies: ['Créatures Venimeuses'], description: 'Trouver un antidote complexe.', objective: 'Antidote purifié', challenges: ['Composition'], reward: 660, bonuses: ['Immunité: +330'] }
            ],
            D: [
                { title: 'Seigneur Bandit', enemies: ['Seigneur des Bandits'], description: 'Affronter le seigneur d\'une bande organisée.', objective: 'Seigneur abattu', challenges: ['Armée'], reward: 1100, bonuses: ['Domination brisée: +500'] },
                { title: 'Lézard Ancien', enemies: ['Lézard Ancien'], description: 'Affronter un lézard ancien et puissant.', objective: 'Ère ancienne fermée', challenges: ['Primitif'], reward: 1150, bonuses: ['Sagesse antique: +550'] },
                { title: 'Dragon Antique', enemies: ['Dragon Antique'], description: 'Affronter un dragon vivant depuis des siècles.', objective: 'Époque révolue', challenges: ['Lair infernal', 'Vieille magie'], reward: 1300, bonuses: ['Trésor légendaire: +650'] },
                { title: 'Démon Majeur', enemies: ['Démon Majeur'], description: 'Affronter un démon de haut pouvoir.', objective: 'Démon banni', challenges: ['Magie ancienne'], reward: 1250, bonuses: ['Artefact démoniaque: +600'] },
                { title: 'Groupe de Chevaliers', enemies: ['Ordre des Chevaliers'], description: 'Affronter un ordre entier de chevaliers.', objective: 'Ordre vaincu', challenges: ['Coordination', 'Discipline'], reward: 1200, bonuses: ['Honneur acquis: +580'] },
                { title: 'Culte Puissant', enemies: ['Grand Prêtre Culte'], description: 'Détruire un culte très influent.', objective: 'Culte détruit', challenges: ['Pouvoir mystique'], reward: 1100, bonuses: ['Illumination: +500'] },
                { title: 'Créature Légendaire', enemies: ['Créature Légendaire'], description: 'Combattre une créature légendaire.', objective: 'Légendaire maîtrisé', challenges: ['Au-delà du normal'], reward: 1180, bonuses: ['Pouvoir légendaire: +570'] },
                { title: 'Récupération d\'Artefact', enemies: ['Gardien Artefact'], description: 'Récupérer un artefact très puissant.', objective: 'Artefact sécurisé', challenges: ['Protection magique'], reward: 1220, bonuses: ['Pouvoir acquis: +600'] },
                { title: 'Démantèlement de Réseau', enemies: ['Maître du Réseau'], description: 'Démanteler un réseau d\'espions massif.', objective: 'Réseau détruit', challenges: ['Complexe'], reward: 1130, bonuses: ['Sécurité: +540'] },
                { title: 'Quête du Remède Ultime', enemies: ['Créatures Mythiques'], description: 'Créer un remède contre un poison ancien.', objective: 'Poison vaincu', challenges: ['Ingrédients rares'], reward: 1170, bonuses: ['Médecine: +560'] }
            ],
            C: [
                { title: 'Empereur des Bandits', enemies: ['Empereur Bandit'], description: 'Affronter l\'empereur des bandits.', objective: 'Empereur abattu', challenges: ['Empire entier'], reward: 1950, bonuses: ['Justice: +800'] },
                { title: 'Lézard Primordial', enemies: ['Lézard Primordial'], description: 'Affronter le lézard primordial.', objective: 'Espèce subjuguée', challenges: ['Source de vie'], reward: 2000, bonuses: ['Domination génétique: +850'] },
                { title: 'Dragon Cosmique', enemies: ['Dragon Cosmique'], description: 'Affronter un dragon cosmique.', objective: 'Cosmique vaincu', challenges: ['Pouvoir stellaire'], reward: 2150, bonuses: ['Essence cosmique: +950'] },
                { title: 'Démon Seigneur', enemies: ['Seigneur Démon'], description: 'Affronter un seigneur démoniaque.', objective: 'Démon banni à jamais', challenges: ['Souveraineté infernale'], reward: 2100, bonuses: ['Trône démoniaque: +900'] },

        let currentRankFilter = 'all';
        let currentEnemyFilter = 'all';

        function renderMissions() {
            const container = document.getElementById('missionsContainer');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let toShow = [];

            Object.keys(missions).forEach(rank => {
                if (currentRankFilter === 'all' || currentRankFilter === rank) {
                    missions[rank].forEach(mission => {
                        const matchesSearch = mission.title.toLowerCase().includes(searchTerm) || 
                                            mission.enemies.some(e => e.toLowerCase().includes(searchTerm));
                        const matchesEnemy = currentEnemyFilter === 'all' || 
                                           mission.enemies.some(e => {
                                               if (currentEnemyFilter === 'Lézards') return e.includes('Lézard');
                                               if (currentEnemyFilter === 'Démons') return e.includes('Démon');
                                               if (currentEnemyFilter === 'Chevaliers') return e.includes('Chevalier');
                                               if (currentEnemyFilter === 'Bandits') return e.includes('Bandit');
                                               if (currentEnemyFilter === 'Dragons') return e.includes('Dragon');
                                               if (currentEnemyFilter === 'Cultistes') return e.includes('Culte');
                                               if (currentEnemyFilter === 'Créatures') return e.includes('Créature');
                                               return false;
                                           });

                        if (matchesSearch && matchesEnemy) {
                            toShow.push({ ...mission, rank });
                        }
                    });
                }
            });

            container.innerHTML = toShow.map(mission => {
                const rankColors = {F: 'var(--rank-f)', E: 'var(--rank-e)', D: 'var(--rank-d)', C: 'var(--rank-c)', B: 'var(--rank-b)', A: 'var(--rank-a)', S: 'var(--rank-s)'};
                return `
                    <div class="mission-card" style="color: ${rankColors[mission.rank]};">
                        <div class="mission-rank">Rang ${mission.rank}</div>
                        <div class="mission-enemies">${mission.enemies.map(e => `<span class="enemy-tag">${e}</span>`).join('')}</div>
                        <div class="mission-title">${mission.title}</div>
                        <div class="mission-description">${mission.description}</div>
                        <div class="reward-badge">💎 ${mission.reward.toLocaleString()} Jewels</div>
                        <button class="btn-view" onclick='openMissionModal(${JSON.stringify(mission).replace(/'/g, "&apos;")})'>Détails →</button>
                    </div>
                `;
            }).join('');

            document.getElementById('missionCount').innerHTML = `<strong>${toShow.length}</strong> mission${toShow.length > 1 ? 's' : ''} trouvée${toShow.length > 1 ? 's' : ''}`;
        }

        function filterByRank(rank) {
            currentRankFilter = rank;
            document.querySelectorAll('.rank-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderMissions();
        }

        function filterByEnemy(enemy) {
            currentEnemyFilter = enemy;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderMissions();
        }

        function applyFilters() {
            renderMissions();
        }

        function openMissionModal(mission) {
            document.getElementById('modalTitle').textContent = mission.title;
            document.getElementById('modalEnemies').textContent = mission.enemies.join(', ');
            document.getElementById('modalDescription').textContent = mission.description;
            document.getElementById('modalObjective').textContent = mission.objective;
            document.getElementById('modalReward').textContent = `💎 ${mission.reward.toLocaleString()} Jewels`;
            document.getElementById('modalChallenges').innerHTML = mission.challenges.map(c => `<li>${c}</li>`).join('');
            document.getElementById('modalBonuses').innerHTML = mission.bonuses.map(b => `<li>${b}</li>`).join('');
            document.getElementById('missionModal').classList.add('active');
        }

        function closeMissionModal(event) {
            if (event && event.target.id !== 'missionModal') return;
            document.getElementById('missionModal').classList.remove('active');
        }

        function acceptMission() {
            alert('✅ Mission acceptée! Bonne chance!');
            closeMissionModal();
        }

        renderMissions();
    </script>
